<!doctype html>
<!--
UNIT INDEX TEMPLATE — skills, interview prep, topic packs (non-course)

Replace {{PLACEHOLDERS}}. Keep filename: index.html inside units/<unit_id>/
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{UNIT_TITLE}} | Learning Hub</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#9da7b3; --green:#03ef62; --blue:#58a6ff; --amber:#d29922; --shadow:0 12px 30px rgba(0,0,0,.24); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:radial-gradient(circle at top left,rgba(210,153,34,.08),transparent 30rem),var(--bg); color:var(--text); line-height:1.6; }
    a { color:var(--blue); text-decoration:none; } a:hover { color:var(--green); }
    .page { width:min(1180px,calc(100% - 32px)); margin:0 auto; padding:24px 0 52px; }
    .breadcrumbs { color:var(--muted); font-size:.9rem; margin-bottom:16px; }
    .hero { background:linear-gradient(135deg,#2a1f08,#3d2c10); border:1px solid #6a5020; border-radius:18px; padding:34px; box-shadow:var(--shadow); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; margin-top:18px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px; }
    .card h3 { margin:0 0 8px; font-size:1.05rem; }
    .card p { margin:0; color:var(--muted); font-size:.92rem; }
  </style>
</head>
<body>
  <main class="page">
    <nav class="breadcrumbs"><a href="../../index.html">Learning Hub</a> › {{UNIT_TITLE}}</nav>
    <header class="hero">
      <p>{{UNIT_KIND_LABEL}}</p>
      <h1>{{UNIT_TITLE}}</h1>
      <p>{{UNIT_SUMMARY}}</p>
    </header>
    <div class="grid">
      <article class="card"><a href="{{FIELD_GUIDE_FILE}}"><h3>Field Guide</h3><p>{{FIELD_GUIDE_BLURB}}</p></a></article>
      <article class="card"><a href="{{DIGEST_FILE}}"><h3>Digest</h3><p>{{DIGEST_BLURB}}</p></a></article>
      <article class="card"><a href="{{LAB_FILE}}"><h3>Lab</h3><p>{{LAB_BLURB}}</p></a></article>
    </div>
    <footer style="margin-top:28px;color:var(--muted);font-size:.88rem;"><a href="../../index.html">← Learning Hub</a></footer>
  </main>
</body>
</html>
