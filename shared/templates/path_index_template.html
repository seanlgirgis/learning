<!doctype html>
<!--
PATH INDEX TEMPLATE — tracks, certs, custom learning paths

Replace {{PLACEHOLDERS}}. Keep filename: index.html inside paths/<path_id>/
Members link to courses/ or units/ — never duplicate content.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PATH_TITLE}} | Learning Hub</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#9da7b3; --green:#03ef62; --blue:#58a6ff; --shadow:0 12px 30px rgba(0,0,0,.24); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:radial-gradient(circle at top left,rgba(3,239,98,.08),transparent 30rem),var(--bg); color:var(--text); line-height:1.6; }
    a { color:var(--blue); text-decoration:none; } a:hover { color:var(--green); }
    .page { width:min(1180px,calc(100% - 32px)); margin:0 auto; padding:24px 0 52px; }
    .breadcrumbs { color:var(--muted); font-size:.9rem; margin-bottom:16px; }
    .hero { background:linear-gradient(135deg,#1a1030,#2a1848); border:1px solid #4a3080; border-radius:18px; padding:34px; box-shadow:var(--shadow); }
    .section { margin-top:22px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:22px; }
    .member-list { list-style:none; padding:0; margin:0; }
    .member-list li { padding:14px 16px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; background:#141920; }
    .member-list .kind { color:var(--muted); font-size:.85rem; text-transform:uppercase; }
  </style>
</head>
<body>
  <main class="page">
    <nav class="breadcrumbs"><a href="../../index.html">Learning Hub</a> › {{PATH_TITLE}}</nav>
    <header class="hero">
      <p>{{PATH_KIND_LABEL}}</p>
      <h1>{{PATH_TITLE}}</h1>
      <p>{{PATH_SUMMARY}}</p>
    </header>
    <section class="section">
      <h2>Members (in order)</h2>
      <ol class="member-list">
        <li><span class="kind">{{MEMBER_1_KIND}}</span><br><a href="{{MEMBER_1_LINK}}">{{MEMBER_1_TITLE}}</a></li>
      </ol>
    </section>
    <footer style="margin-top:28px;color:var(--muted);font-size:.88rem;"><a href="../../index.html">← Learning Hub</a></footer>
  </main>
</body>
</html>
